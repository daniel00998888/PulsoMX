name: Automatizacion de Noticias PulsoMX

on:
  schedule:
    - cron: '0 */4 * * *' # 🔥 ¡Corregido! Ahora sí se ejecutará cada 4 horas (6 veces al día)
  workflow_dispatch: # Nos da un botón para ejecutarlo manualmente cuando queramos

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Instalar dependencias
        run: pip install -r requirements.txt
        
      - name: Ejecutar Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}          # 🚨 ¡Agregado! Necesario para Facebook
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}  # 🚨 ¡Agregado! Necesario para Facebook
        run: python bot.py
        
      - name: Guardar Cambios
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/noticias.json
          git commit -m "🤖 Noticias actualizadas automáticamente" || exit 0
          git push
